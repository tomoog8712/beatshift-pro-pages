<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>BeatShift Pro</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --app-h: 100dvh;
            --bg: #0a0a0f;
            --bg-elevated: #1c1c24;
            --surface: #1a1a22;
            --surface-raised: #22222c;
            --surface-hover: #2a2a34;
            --surface-active: #30303c;
            --border: rgba(255, 255, 255, 0.12);
            --border-strong: rgba(255, 255, 255, 0.18);
            --text: #f5f5f7;
            --text-secondary: rgba(235, 235, 245, 0.55);
            --accent: #64d2ff;
            --accent-glow: rgba(100, 210, 255, 0.35);
            --accent-purple: #bf5af2;
            --accent-orange: #ff9f0a;
            --accent-teal: #5ac8fa;
            --accent-pink: #ff375f;
            --accent-green: #30d158;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --hero-h: clamp(90px, 15vh, 120px);
            --btn-pad: clamp(7px, 1.1vh, 10px);
            --slider-pad: clamp(4px, 0.7vh, 6px);
            --app-gap: 6px;
            --dial-size: 150px;
            --ctrl-btn-h-seq: calc((var(--dial-size) - 2 * var(--app-gap)) / 3);
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; background: var(--bg); color: var(--text); touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: stretch; user-select: none; -webkit-user-select: none; }
        .container { width: 100%; max-width: 430px; height: var(--app-h); background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(100, 210, 255, 0.12), transparent 55%), radial-gradient(ellipse 80% 50% at 100% 100%, rgba(191, 90, 242, 0.08), transparent 50%), var(--bg); padding: calc(var(--app-gap) + var(--safe-top)) calc(14px + var(--safe-right)) calc(var(--app-gap) + var(--safe-bottom)) calc(14px + var(--safe-left)); box-sizing: border-box; position: relative; display: flex; flex-direction: column; gap: var(--app-gap); overflow: hidden; }
        
        /* 1. 最上部コントロールバー */
        .top-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; height: 28px; flex: 0 0 auto; margin-top: 0; position: relative; }
        .top-left-group { display: flex; align-items: center; gap: var(--app-gap); z-index: 2; }
        
        .active-mode-status { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; min-width: 90px; }
        
        .app-title-center { position: absolute; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 800; letter-spacing: 0.05em; background: linear-gradient(180deg, #ffffff, var(--text-secondary)); -webkit-background-clip: text; color: transparent; z-index: 1; pointer-events: none; }

        /* 液晶内の拍子セレクトデザイン調整 */
        .hero-beat-select-wrap { display: flex; justify-content: center; width: 100%; margin-bottom: 0; }
        .beat-select { background: var(--surface-raised); color: var(--text); border: 1px solid var(--border-strong); font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 999px; outline: none; cursor: pointer; text-align: center; -webkit-appearance: none; appearance: none; }
        
        .top-right-group { display: flex; align-items: center; gap: var(--app-gap); z-index: 2; }
        
        .list-open-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 13px; font-weight: 600; padding: 3px 9px; border-radius: 999px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .list-open-btn:active { background: var(--surface-hover); }
        
        /* 2. ナビゲーション */
        .tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--app-gap); flex: 0 0 auto; gap: var(--app-gap); box-sizing: border-box; }
        .tab { flex: 1; text-align: center; padding: clamp(5px, 1vh, 8px) 2px; font-size: 10px; font-weight: 700; color: var(--text-secondary); cursor: pointer; border-radius: 11px; white-space: nowrap; }
        .tab.active { background: var(--surface-active); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-strong); }
        
        .tab#tab-0.active { color: var(--accent); }
        .tab#tab-1.active { color: var(--accent-pink); }
        .tab#tab-2.active { color: var(--accent-purple); }
        .tab#tab-3.active { color: var(--accent-orange); }
        .tab#tab-4.active { color: var(--accent-teal); }
        
        /* 液晶メインエリア */
        .hero { position: relative; height: var(--hero-h); flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--app-gap); overflow: hidden; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); box-sizing: border-box; }
        .hero-side { width: 40px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .beat-ring { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.12); display: flex; align-items: center; justify-content: center; transition: border-color 0.05s, box-shadow 0.05s; }
        .beat-ring.flash { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .beat-ring-inner { width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); }
        .beat-ring.flash .beat-ring-inner { background: var(--accent); transform: scale(1.3); }
        .hero-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 0; height: 100%; gap: var(--app-gap); }
        #hero-normal-view { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--app-gap); width: 100%; }
        .hero-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0; line-height: 1.1; }
        .hero-bpm { font-size: clamp(36px, 9vw, 48px); font-weight: 700; line-height: 0.95; letter-spacing: -0.04em; background: linear-gradient(180deg, #ffffff 30%, rgba(255, 255, 255, 0.72)); -webkit-background-clip: text; color: transparent; }
        .tempo-display-wrapper {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: var(--app-gap) !important;
            width: 100%;
        }
        .tempo-display-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }
        .bpm-skip-btn {
            flex: none !important;
            background: var(--surface-raised) !important;
            border: 1px solid var(--border) !important;
            color: #fff !important;
            font-size: 14px !important;
            font-weight: bold !important;
            border-radius: 8px !important;
            width: 44px !important;
            height: 36px !important;
            padding: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            transition: all 0.1s ease !important;
            user-select: none !important;
            -webkit-user-select: none !important;
            line-height: 1 !important;
        }
        .bpm-skip-btn:active {
            background: var(--surface-hover) !important;
            border-color: var(--border-strong) !important;
            transform: scale(0.95) !important;
            opacity: 1 !important;
        }
        .bpm-skip-btn.minus-10 {
            color: #e74c3c !important;
        }
        .bpm-skip-btn.plus-10 {
            color: #3498db !important;
        }
        .beat-dots { display: flex; gap: var(--app-gap); margin-top: 0; }
        .beat-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255, 255, 255, 0.15); }
        .beat-dot.active { background: var(--accent); transform: scale(1.25); box-shadow: 0 0 8px var(--accent-glow); }
        .pendulum-wrap { width: 28px; height: 28px; display: flex; align-items: flex-end; justify-content: center; }
        .pendulum { width: 2px; height: 22px; background: linear-gradient(to top, var(--accent), rgba(100, 210, 255, 0.2)); border-radius: 2px; transform-origin: bottom center; transition: transform 0.06s; box-shadow: 0 0 10px var(--accent-glow); }

        .hero-text-wrapper { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .hero-text-main { font-size: clamp(22px, 6vw, 30px); font-weight: 800; text-align: center; }
        .hero-text-sub { font-size: 11px; color: var(--text-secondary); font-weight: 600; background: rgba(255, 255, 255, 0.06); display: inline-block; padding: 3px 12px; border-radius: 999px; border: 1px solid var(--border); margin-top: 6px; cursor: pointer; }

        /* 変拍子専用：ヒーローエリア内の丸配置用コンテナ */
        #hero-odd-view { display: none; flex-wrap: wrap; gap: var(--app-gap); justify-content: center; align-items: center; width: 100%; max-height: 90%; overflow-y: auto; padding: var(--app-gap); box-sizing: border-box; }

        .controls-block {
            flex: 0 0 auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: var(--app-gap);
            padding: 0;
            overflow: visible;
        }
        .controls-left-column {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: var(--dial-size);
            gap: var(--app-gap);
        }
        .controls-left-column > button {
            flex: 0 0 var(--ctrl-btn-h-seq);
            width: 100%;
            height: var(--ctrl-btn-h-seq);
            min-height: var(--ctrl-btn-h-seq);
            max-height: var(--ctrl-btn-h-seq);
            padding: 0 12px;
            margin: 0;
            font-size: clamp(12px, 3.2vw, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            line-height: 1.1;
        }
        .container.mode-changeup .controls-left-column > button.btn-tap,
        .container.mode-changeup .controls-left-column > button.cup-toggle-btn {
            flex: 0 0 36px !important;
            height: 36px !important;
            min-height: 36px !important;
            max-height: 36px !important;
        }
        button { flex: 1; padding: var(--btn-pad) 0; border: none; border-radius: 8px; font-weight: 600; font-size: clamp(11px, 2.9vw, 13px); cursor: pointer; line-height: 1.1; }
        button:active { transform: scale(0.97); opacity: 0.88; }
        .btn-tap { background: var(--surface-raised); color: var(--accent); border: 1px solid rgba(100, 210, 255, 0.25); }
        .btn-sound { background: var(--surface-raised); color: var(--text); border: 1px solid var(--border); }
        .btn-swing { background: var(--surface-raised); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-swing.active {
            background: rgba(52, 152, 219, 0.12) !important;
            border-color: #3498db !important;
            color: #3498db !important;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.25);
        }
        .btn-swing:disabled,
        .btn-swing.disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        #swing-slider-box.swing-disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* C.UP専用：小節トグル + 音符表示（SEQでは非表示） */
        .cup-toggle-btn,
        #cup-current-note {
            display: none !important;
        }
        #cup-current-note {
            flex: 1 1 auto;
            align-items: center;
            justify-content: center;
            font-size: clamp(28px, 8.5vw, 38px);
            font-weight: 800;
            color: var(--accent-pink);
            line-height: 1;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.02em;
            text-shadow: 0 0 10px rgba(255, 55, 95, 0.35);
            text-align: center;
            box-sizing: border-box;
            min-height: 0;
        }
        #cup-current-note.active-playing {
            color: #ff6b9d;
            text-shadow:
                0 0 12px rgba(255, 55, 95, 0.65),
                0 0 24px rgba(255, 55, 95, 0.35);
        }
        .cup-toggle-btn {
            flex: 0 0 auto !important;
            width: 100% !important;
            padding: 4px 8px !important;
            margin: 0 !important;
            border: 1px solid rgba(100, 210, 255, 0.28) !important;
            border-radius: 6px !important;
            background: linear-gradient(180deg, rgba(100, 210, 255, 0.12) 0%, rgba(100, 210, 255, 0.05) 100%) !important;
            color: var(--text-secondary) !important;
            font-size: 9px !important;
            font-weight: 700 !important;
            line-height: 1.15 !important;
            cursor: pointer !important;
            align-items: center !important;
            justify-content: center !important;
            gap: var(--app-gap) !important;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06) !important;
            transition: background 0.12s ease, border-color 0.12s ease, transform 0.1s ease !important;
        }
        .cup-toggle-btn::before {
            content: '⇄';
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            opacity: 0.85;
            flex-shrink: 0;
        }
        .cup-toggle-btn:active {
            transform: scale(0.97) !important;
            background: linear-gradient(180deg, rgba(100, 210, 255, 0.22) 0%, rgba(100, 210, 255, 0.1) 100%) !important;
            border-color: rgba(100, 210, 255, 0.45) !important;
            opacity: 1 !important;
        }
        #cup-measure-progress {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.15;
            pointer-events: none;
        }
        .container.mode-changeup .cup-toggle-btn,
        .container.mode-changeup #cup-current-note {
            display: flex !important;
        }
        .container:not(.mode-changeup) #sound-btn.btn-sound {
            display: flex !important;
        }
        .container.mode-changeup .controls-left-column {
            justify-content: flex-start;
            gap: var(--app-gap);
        }
        .container.mode-changeup .controls-left-column .btn-tap {
            font-size: clamp(11px, 2.8vw, 13px) !important;
        }
        .container.mode-changeup .controls-left-column .cup-toggle-btn {
            padding: 0 8px !important;
        }

        /* BOSS DB-90風 テンポダイヤル */
        .tempo-dial-wrapper {
            position: relative;
            flex: 0 0 auto;
            flex-shrink: 0;
            width: var(--dial-size);
            height: var(--dial-size);
            min-width: var(--dial-size);
            min-height: var(--dial-size);
            overflow: visible;
            filter: drop-shadow(0 5px 14px rgba(0, 0, 0, 0.45));
            cursor: grab;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .tempo-dial-wrapper.dragging { cursor: grabbing; }
        .tempo-dial-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-sizing: border-box;
            overflow: visible;
            cursor: inherit;
            pointer-events: none;
        }
        .tempo-dial-container .tempo-dial-rotator,
        .tempo-dial-container .tempo-dial-bezel {
            pointer-events: none;
        }
        .tempo-dial-rotator {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform-origin: center center;
            will-change: transform;
            z-index: 1;
            overflow: visible;
            pointer-events: none;
            transition: transform 0.06s linear;
        }
        .tempo-dial-wrapper.dragging .tempo-dial-rotator {
            transition: none;
        }
        .tempo-dial-rotator::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-conic-gradient(
                from -3deg,
                #c06500 0deg 2.4deg,
                #f39c12 2.4deg 4.8deg
            );
            z-index: 0;
            pointer-events: none;
        }
        .tempo-dial-face {
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            z-index: 1;
            background:
                radial-gradient(circle at 38% 32%, #f5b041 0%, #f39c12 40%, #e67e22 70%, #d35400 100%);
            box-shadow:
                inset 0 3px 10px rgba(255, 220, 150, 0.55),
                inset 0 -5px 14px rgba(140, 55, 0, 0.35),
                0 2px 8px rgba(0, 0, 0, 0.25);
        }
        .tempo-dial-dots {
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            z-index: 2;
            background: repeating-conic-gradient(
                from 15deg,
                rgba(140, 50, 0, 0.85) 0deg 1.5deg,
                transparent 1.5deg 30deg
            );
            -webkit-mask: radial-gradient(circle, transparent 62%, #000 64%, #000 70%, transparent 72%);
            mask: radial-gradient(circle, transparent 62%, #000 64%, #000 70%, transparent 72%);
            pointer-events: none;
        }
        .tempo-dial-dimple {
            --dimple-orbit: 54px;
            --dimple-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--dimple-size) !important;
            height: var(--dimple-size) !important;
            min-width: var(--dimple-size);
            min-height: var(--dimple-size);
            margin: 0;
            border-radius: 50% !important;
            box-sizing: border-box;
            transform: translate(-50%, -50%) translateY(calc(-1 * var(--dimple-orbit)));
            background: radial-gradient(circle at 42% 38%, rgba(255, 195, 100, 0.3) 0%, rgba(130, 55, 0, 0.42) 62%, rgba(80, 30, 0, 0.52) 100%);
            box-shadow:
                inset 2px 2px 5px rgba(0, 0, 0, 0.45),
                inset -2px -2px 5px rgba(255, 210, 130, 0.22),
                inset 0 3px 7px rgba(50, 15, 0, 0.5);
            pointer-events: none;
            z-index: 3;
        }
        .tempo-dial-bezel {
            position: absolute;
            inset: 30px;
            border-radius: 50%;
            background: transparent;
            box-shadow:
                inset 0 0 0 2px rgba(0, 0, 0, 0.45),
                inset 0 3px 10px rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }
        .dial-center-start-btn {
            position: absolute;
            top: calc(50% - 45px);
            left: calc(50% - 45px);
            width: 90px !important;
            height: 90px !important;
            min-width: 90px !important;
            min-height: 90px !important;
            max-width: 90px !important;
            max-height: 90px !important;
            flex: 0 0 auto !important;
            flex-shrink: 0 !important;
            aspect-ratio: 1 / 1 !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            box-sizing: border-box !important;
            padding: 0 !important;
            margin: 0 !important;
            line-height: 1 !important;
            overflow: visible !important;
            border: 2px solid rgba(0, 0, 0, 0.38) !important;
            background: linear-gradient(180deg, #1f6b3a 0%, #0d3d1f 52%, #082a15 100%) !important;
            color: #fff !important;
            font-size: clamp(11px, 3vw, 14px) !important;
            font-weight: 800 !important;
            letter-spacing: 0.06em;
            z-index: 10;
            cursor: pointer;
            transform: none;
            transform-origin: center center;
            box-shadow:
                inset 0 2px 8px rgba(255, 255, 255, 0.12),
                inset 0 -4px 10px rgba(0, 0, 0, 0.5),
                0 3px 12px rgba(0, 0, 0, 0.42);
            touch-action: manipulation;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.45);
            transition:
                background 0.45s ease,
                border-color 0.45s ease,
                box-shadow 0.45s ease,
                transform 0.1s ease;
            pointer-events: auto;
            -webkit-appearance: none;
            appearance: none;
        }
        .dial-center-start-btn:active {
            transform: scale(0.96) !important;
            opacity: 0.92;
        }
        .dial-center-start-btn.stop {
            background: linear-gradient(180deg, #5dffa0 0%, #2ecc71 42%, #27ae60 100%) !important;
            border-color: rgba(120, 255, 180, 0.7) !important;
            color: #fff !important;
            animation: dial-stop-glow 1.4s ease-in-out infinite alternate;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.65);
        }
        @keyframes dial-stop-glow {
            from {
                box-shadow:
                    0 0 14px rgba(46, 204, 113, 0.75),
                    0 0 28px rgba(46, 204, 113, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.35),
                    inset 0 -2px 8px rgba(0, 0, 0, 0.25),
                    0 3px 10px rgba(0, 0, 0, 0.3);
            }
            to {
                box-shadow:
                    0 0 24px rgba(190, 255, 80, 0.95),
                    0 0 48px rgba(46, 204, 113, 0.55),
                    inset 0 1px 0 rgba(255, 255, 255, 0.45),
                    inset 0 0 16px rgba(190, 255, 100, 0.5),
                    0 3px 10px rgba(0, 0, 0, 0.2);
            }
        }

        .slider-container { background: var(--surface); padding: var(--slider-pad) 12px; border-radius: var(--radius-md); border: 1px solid var(--border); flex: 0 0 auto; width: 100%; box-sizing: border-box; }
        .slider-container label { font-size: clamp(9.5px, 2.6vw, 11px); font-weight: 600; color: var(--text-secondary); display: flex; justify-content: space-between; margin-bottom: 1px; line-height: 1.15; }
        .slider-container label span { color: var(--accent); }
        .slider-container input[type="range"] { width: 100%; height: 4px; margin: 2px 0 1px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.12); border-radius: 2px; outline: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 1px 4px rgba(0,0,0,0.35); cursor: pointer; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 1px 4px rgba(0,0,0,0.35); cursor: pointer; }
        #swing-slider-box {
            margin-top: 0;

    function initTimeSignatureData(beats) {

    const MIXER_FADER_TYPES = ['accent', 'quarter', 'eighth', 'sixteenth', 'triplet'];
    const MIXER_DEFAULT_PCT = { accent: 100, quarter: 100, eighth: 0, sixteenth: 0, triplet: 0 };

    function readFaderPct(fader, type) {
        if (!fader) return MIXER_DEFAULT_PCT[type];
        const raw = parseInt(fader.dataset.value, 10);
        return Number.isFinite(raw) ? raw : MIXER_DEFAULT_PCT[type];
    }

    function setMixerVolVar(type, pct) {
        const val = Math.max(0, Math.min(100, Math.round(parseFloat(pct))));
        const norm = val / 100;
        if (type === 'accent') accentVol = norm;
        else if (type === 'quarter') quarterVol = norm;
        else if (type === 'eighth') eighthVol = norm;
        else if (type === 'sixteenth') sixteenthVol = norm;
        else if (type === 'triplet') tripletVol = norm;
        const label = document.getElementById('mixer-val-' + type);
        if (label) label.innerText = val;
        const fader = getCustomFaderEl(type);
        if (fader) fader.dataset.value = String(val);
        return val;
    }

    function updateMixerVol(type, val) {
        setMixerVolVar(type, val);
    }

    const FADER_KNOB_H = 18;
    const FADER_PAD_TOP = 10;
    const FADER_PAD_BOTTOM = 10;
    let activeCustomFader = null;
    let customFadersInitialized = false;

    function getCustomFaderEl(type) {
        return document.querySelector('.custom-fader[data-fader-type="' + type + '"]');
    }

    function getMixerFaderValue(type) {
        const fader = getCustomFaderEl(type);
        return fader ? readFaderPct(fader, type) : MIXER_DEFAULT_PCT[type];
    }

    function updateCustomFaderKnobPosition(fader) {
        const track = fader.querySelector('.fader-track-container');
        const knob = fader.querySelector('.fader-knob');
        if (!track || !knob) return;
        const type = fader.getAttribute('data-fader-type');
        const val = readFaderPct(fader, type);
        const trackH = track.clientHeight;
        const travel = Math.max(0, trackH - FADER_KNOB_H - FADER_PAD_TOP - FADER_PAD_BOTTOM);
        const bottom = FADER_PAD_BOTTOM + (val / 100) * travel;
        knob.style.bottom = bottom + 'px';
    }

    function setCustomFaderValue(type, value) {
        const fader = getCustomFaderEl(type);
        if (!fader) return;
        setMixerVolVar(type, value);
        updateCustomFaderKnobPosition(fader);
    }

    function syncAllMixerVolsFromFaders() {

    function renderMixerIcons() {
        const accentWrap = document.querySelector('.custom-fader[data-fader-type="accent"] .mixer-icon-wrap');
        if (accentWrap) {
            accentWrap.className = 'mixer-icon-wrap mixer-icon-text';
            accentWrap.textContent = 'A';
        }
        const setIcons = (type, html) => {
            const wrap = document.querySelector('.custom-fader[data-fader-type="' + type + '"] .mixer-icon-wrap');
            if (!wrap) return;
            wrap.className = 'mixer-icon-wrap';
            wrap.innerHTML = html;
        };
        setIcons('quarter', MIXER_SVG.quarter);
        setIcons('eighth', MIXER_SVG.eighthRest + MIXER_SVG.eighthNote);
        setIcons('sixteenth', MIXER_SVG.sixteenthRest + MIXER_SVG.sixteenthNote + MIXER_SVG.sixteenthRest + MIXER_SVG.sixteenthNote);
        setIcons('triplet', MIXER_SVG.triplet);
    }

    function initMixerState() {
        sanitizeMixerDOM();
        renderMixerIcons();
        MIXER_FADER_TYPES.forEach(type => {
            const fader = getCustomFaderEl(type);
            const pct = readFaderPct(fader, type);
            setMixerVolVar(type, pct);
            if (fader) updateCustomFaderKnobPosition(fader);
        });
    }

    function valueFromPointerY(track, clientY) {
        const rect = track.getBoundingClientRect();
        const travel = Math.max(0, rect.height - FADER_KNOB_H - FADER_PAD_TOP - FADER_PAD_BOTTOM);
        const y = clientY - rect.top - FADER_PAD_TOP - FADER_KNOB_H / 2;
        const ratio = 1 - Math.max(0, Math.min(1, y / travel));
        return Math.round(ratio * 100);
    }

    function refreshAllCustomFaders() {
        document.querySelectorAll('.custom-fader').forEach(f => updateCustomFaderKnobPosition(f));
    }

    function bpmToDialRotation(val) { return (val - BPM_MIN) * DEG_PER_BPM; }

    const DIAL_ROT_MIN = 0;
    const DIAL_ROT_MAX = (BPM_MAX - BPM_MIN) * DEG_PER_BPM;

    function clampDialRotation(deg) {
        return Math.max(DIAL_ROT_MIN, Math.min(DIAL_ROT_MAX, deg));
    }

    function syncDialRotationToBpm() {
        dialRotation = bpmToDialRotation(bpm);
        dialBpmAccum = 0;
        setDialVisualRotation(dialRotation);
    }

    function setDialVisualRotation(deg) {
        const rotator = document.getElementById('tempo-dial-rotator');
        if (rotator) rotator.style.transform = `rotate(${deg}deg)`;
    }

    function syncDialFromBpm() {
        if (dialDragging) return;
        syncDialRotationToBpm();
    }

    function triggerHapticFeedback() {
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics) {
            try {
                const haptics = window.Capacitor.Plugins.Haptics;
                if (haptics.selectionStart) {
                    const p = haptics.selectionStart();
                    if (p && typeof p.catch === 'function') p.catch(() => {});
                }
                if (haptics.selectionChanged) {
                    const p = haptics.selectionChanged();
                    if (p && typeof p.catch === 'function') p.catch(() => {});
                }
            } catch (e) {}
            return;
        }

        const isCapacitorNative = window.Capacitor
            && typeof window.Capacitor.isNativePlatform === 'function'
            && window.Capacitor.isNativePlatform();
        const isIosWebBrowser = !isCapacitorNative
            && /iPad|iPhone|iPod/.test(navigator.userAgent)
            && !window.MSStream;
        if (isIosWebBrowser) return;

        if (typeof navigator !== 'undefined' && navigator.vibrate) {
            try { navigator.vibrate(12); } catch (e) {}
        }
    }

    function initTempoDial() {
        const wrapper = document.querySelector('.tempo-dial-wrapper');
        const container = document.getElementById('tempo-dial');
        const rotator = document.getElementById('tempo-dial-rotator');
        if (!wrapper || !container || !rotator) return;

        syncDialFromBpm();

        function getPointerAngle(clientX, clientY) {
            const rect = wrapper.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            return Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI);
        }

        function applyDialDelta(delta) {
            if (!delta) return;

            const nextRot = clampDialRotation(dialRotation + delta);
            const appliedDelta = nextRot - dialRotation;
            if (appliedDelta === 0) {
                if (bpm <= BPM_MIN || bpm >= BPM_MAX) dialBpmAccum = 0;
                return;
            }

            dialRotation = nextRot;
            setDialVisualRotation(dialRotation);

            if (bpm <= BPM_MIN && appliedDelta < 0) {
                dialBpmAccum = 0;
                return;
            }
            if (bpm >= BPM_MAX && appliedDelta > 0) {
                dialBpmAccum = 0;
                return;
            }

            dialBpmAccum += appliedDelta * BPM_PER_DEGREE;

            let step = 0;
            if (dialBpmAccum >= 1) {
                step = Math.floor(dialBpmAccum);
            } else if (dialBpmAccum <= -1) {
                step = Math.ceil(dialBpmAccum);
            }

            if (step !== 0) {
                const previousIntegerBpm = Math.floor(bpm);
                const newBpm = Math.max(BPM_MIN, Math.min(BPM_MAX, bpm + step));
                const applied = newBpm - bpm;
                dialBpmAccum -= applied;
                if (applied !== 0) {
                    updateBPM(newBpm, true);
                    const newIntegerBpm = Math.floor(newBpm);
                    if (newIntegerBpm !== previousIntegerBpm) {
                        triggerHapticFeedback();
                    }
                }
                if (newBpm <= BPM_MIN || newBpm >= BPM_MAX) {
                    syncDialRotationToBpm();
                }
            }
        }

        function onPointerMove(clientX, clientY) {
            const angle = getPointerAngle(clientX, clientY);
            if (dialLastAngle === null) {
                dialLastAngle = angle;
                return;
            }
            let delta = angle - dialLastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            dialLastAngle = angle;
            applyDialDelta(delta);
        }

    function loadArrayBuffer(url) {
        // Prefer plain relative URLs. Native shell serves via beatshift:// (not file://).
        const isFile = typeof location !== 'undefined' && location.protocol === 'file:';
        const isCustom = typeof location !== 'undefined' && location.protocol === 'beatshift:';
        const requestUrl = (isFile || isCustom)
            ? url
            : (url + (url.includes('?') ? '&' : '?') + 'v=' + voiceAssetBust);

        if (isFile) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', requestUrl, true);
                xhr.responseType = 'arraybuffer';
                xhr.onload = () => {
                    if (xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300)) {
                        resolve(xhr.response);
                    } else {
                        reject(new Error('XHR ' + xhr.status));
                    }
                };
                xhr.onerror = () => reject(new Error('XHR network error'));
                xhr.send();
            });
        }

        return fetch(requestUrl, { cache: 'no-store' }).then(async (response) => {
            if (!response.ok && response.status !== 0) {
                throw new Error('HTTP ' + response.status);
            }
            return response.arrayBuffer();
        });
    }

    async function loadVoiceFile(key, url) {
        if (!audioCtx || audioBuffers[key]) return;
        try {
            const arrayBuffer = await loadArrayBuffer(url);
            const buffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
            audioBuffers[key] = buffer;
        } catch (e) {
            console.error('ボイスファイルの読み込みに失敗しました: ' + key, e);
        }
    }

    async function loadAllVoiceFiles() {
        if (areAllAudioAssetsLoaded()) {
            if (audioBuffers['wood_weak']) audioBuffers['weak'] = audioBuffers['wood_weak'];
            if (audioBuffers['wood_strong']) {
                audioBuffers['guide'] = audioBuffers['wood_strong'];
                audioBuffers['strong'] = audioBuffers['wood_strong'];
            }
            return;
        }
        if (voicesLoadPromise) return voicesLoadPromise;
        voicesLoadPromise = Promise.all(ALL_AUDIO_FILES.map(([key, url]) => loadVoiceFile(key, url))).finally(() => {
            voicesLoadPromise = null;
            // WAV overrides synth placeholders when load succeeds.
            if (audioBuffers['wood_weak']) audioBuffers['weak'] = audioBuffers['wood_weak'];
            if (audioBuffers['wood_strong']) {
                audioBuffers['guide'] = audioBuffers['wood_strong'];
                audioBuffers['strong'] = audioBuffers['wood_strong'];
            }
        });
        return voicesLoadPromise;
    }

    function preRenderSynthBuffers() {

        audioBuffers['weak'] = audioBuffers['wood_weak'];
        audioBuffers['guide'] = audioBuffers['wood_strong'];
        audioBuffers['strong'] = audioBuffers['wood_strong'];

        if (!audioBuffers['global_click_accent'] || !audioBuffers['global_click_strong']) {
            const sampleRate = audioCtx.sampleRate || 44100;
            const clickBufLen = Math.floor(sampleRate * 0.04);
            if (!audioBuffers['global_click_accent']) {
                const bAcc = audioCtx.createBuffer(1, clickBufLen, sampleRate);

            currentBar = 1;

        } else if (appMode === 'Modulation') { 
            modStepIdx = 0;
            modBeatStartTime = 0;

            oddCurrentStep = 0;
            oddVoiceCounter = 0; 
        } else if (appMode === 'Speed') {
            currentBeatInBar = 0;

            spdCountInState = 1;

            spdLastBpmUpdateTime = audioCtx.currentTime;
            updateBPM(spdAutomatingBpm);
            if (lblLabel) lblLabel.innerText = currentLang === 'JP' ? '⏱️ カウントイン' : 'Count In';
        }
        scheduleAheadTime = scheduleAheadTimeForeground;
        startSilentKeepAlive();
        try { notifyNative('metronomeStart', { bpm: getEffectiveBpm() }); } catch (e) {}
        timerID = setInterval(scheduler, lookahead);
        scheduler();
    }
    function stopMetronome() {

    function scheduler() {
        if (!audioCtx || !running) return;
        if (!Number.isFinite(nextEventTime)) {
            nextEventTime = audioCtx.currentTime + 0.05;
        }
        let safety = 0;
        while (nextEventTime < audioCtx.currentTime + scheduleAheadTime && safety++ < 32) {
            scheduleEvent();
        }
    }

            try { notifyNative('metronomeStart', { bpm: getEffectiveBpm() }); } catch (e) {}
        }

    function getModSwingType() {
        if (appMode !== 'Modulation') return null;
        const activeModType = modMatrixPool[modMatrixIndex];
        if (activeModType.startsWith('3連')) return 'disabled';
        if (activeModType.includes('16分')) return 'sixteenth';
        if (activeModType.includes('8分')) return 'eighth';

    function applyModSwingConstraints() {
        const modSwingType = getModSwingType();
        if (!modSwingType) return;
        if (modSwingType === 'disabled') {
            swingMode = 'off';
        } else if (modSwingType === 'eighth' && swingMode === 'sixteenth') {
            swingMode = 'off';

            swingMode = 'off';
        }

        const btn = document.getElementById('swing-btn');

        const swingSlider = document.getElementById('swing-slider');
        if (!btn) return;
        const d = langDict[currentLang];
        const modSwingType = getModSwingType();
        const isDisabled = modSwingType === 'disabled';

        btn.disabled = isDisabled;
        btn.classList.toggle('disabled', isDisabled);
        if (swingSlider) swingSlider.disabled = isDisabled;
        if (swingSliderBox) swingSliderBox.classList.toggle('swing-disabled', isDisabled);

        if (isDisabled) {

        }

        btn.classList.toggle('active', swingMode !== 'off');
        if (swingMode === 'eighth') btn.innerText = d.swingBtn8th;

    function getSwingSubbeatOffset(beatLen, gridPos) {
        if (swingMode === 'eighth' && gridPos === 0.5) return beatLen * swingRatio;
        if (swingMode === 'sixteenth') {
            if (gridPos === 0.25) return beatLen * (swingRatio / 2);
            if (gridPos === 0.75) return beatLen * (0.5 + swingRatio / 2);
        }
        return beatLen * gridPos;
    }

    function toggleSwing() {
        const modSwingType = getModSwingType();
        if (modSwingType === 'disabled') return;
        if (modSwingType === 'eighth') {
            swingMode = (swingMode === 'eighth') ? 'off' : 'eighth';
        } else if (modSwingType === 'sixteenth') {
            swingMode = (swingMode === 'sixteenth') ? 'off' : 'sixteenth';
        } else {
            const modes = ['off', 'eighth', 'sixteenth'];
            swingMode = modes[(modes.indexOf(swingMode) + 1) % modes.length];
        }
        updateSwingBtnUI();
    }
    
    function getSpdRhythmConfig() {
        const spdRhythmType = spdRhythmPool[spdRhythmIndex];
        let divisions = 4;
        if (spdRhythmType === '4分音符') divisions = 1;
        else if (spdRhythmType === '8分音符') divisions = 2;
        else if (spdRhythmType === '3連符') divisions = 3;
        else if (spdRhythmType === '16分音符') divisions = 4;
        return {
            spdRhythmType,
            divisions,
            is2拍3連: spdRhythmType === '2拍3連',
            stepInterval: (beatInterval) => spdRhythmType === '2拍3連' ? (beatInterval * 2 / 3) : (beatInterval / divisions)
        };
    }

    function scheduleSpdRhythmStep(beatInterval, options = {}) {
        const { withClickOnBeat = false, endAfterOneBar = false } = options;
        const rhythm = getSpdRhythmConfig();
        const stepInterval = rhythm.stepInterval(beatInterval);

        if (rhythm.is2拍3連) {
            let virtualOddStep = currentStepInBeat % 3;
            let copyBeat = Math.floor(currentStepInBeat / 3) * 2;

            if (virtualOddStep === 0) {
                setTimeout(() => flashLED(copyBeat), Math.max(0, (nextEventTime - audioCtx.currentTime) * 1000));
                triggerVoiceBuffer(nextEventTime, copyBeat, spdVolGuide);
                if (withClickOnBeat) {
                    let clickKey = (copyBeat === 0) ? 'global_click_accent' : 'global_click_strong';
                    triggerBufferAt(audioBuffers[clickKey], nextEventTime, spdVolGuide * 0.7);
                }
            }
            triggerBufferAt(audioBuffers['wood_weak'], nextEventTime, spdVolPulse);

            nextEventTime += stepInterval;
            currentStepInBeat++;
            if (endAfterOneBar) {
                if (currentStepInBeat >= 6) {
                    currentStepInBeat = 0;
                    currentBeatInBar = 0;
                    spdCountInState = 0;
                    spdLastBpmUpdateTime = nextEventTime;
                    setTimeout(() => {
                        const lblLabel = document.getElementById('hero-label-text');
                        if (lblLabel) lblLabel.innerText = "Tempo";
                    }, Math.max(0, (nextEventTime - audioCtx.currentTime) * 1000));
                }
            } else if (currentStepInBeat >= 6) {
                currentStepInBeat = 0;
            }
            return;
        }

        if (currentStepInBeat === 0) {
            let copyBeat = currentBeatInBar;
            setTimeout(() => flashLED(copyBeat), Math.max(0, (nextEventTime - audioCtx.currentTime) * 1000));
            triggerVoiceBuffer(nextEventTime, copyBeat, spdVolGuide);
            if (withClickOnBeat) {
                let clickKey = (currentBeatInBar === 0) ? 'global_click_accent' : 'global_click_strong';
                triggerBufferAt(audioBuffers[clickKey], nextEventTime, spdVolGuide * 0.7);
            }
        }

        triggerBufferAt(audioBuffers['wood_weak'], nextEventTime, spdVolPulse);

        nextEventTime += stepInterval;
        currentStepInBeat++;

        if (currentStepInBeat >= rhythm.divisions) {
            currentStepInBeat = 0;
            currentBeatInBar++;
            if (endAfterOneBar && currentBeatInBar >= 4) {
                currentBeatInBar = 0;
                spdCountInState = 0;
                spdLastBpmUpdateTime = nextEventTime;
                setTimeout(() => {
                    const lblLabel = document.getElementById('hero-label-text');
                    if (lblLabel) lblLabel.innerText = "Tempo";
                }, Math.max(0, (nextEventTime - audioCtx.currentTime) * 1000));
            } else if (!endAfterOneBar) {
                currentBeatInBar = currentBeatInBar % 4;
            }
        }
    }

        if (ring) { ring.classList.remove('flash'); void ring.offsetWidth; ring.classList.add('flash'); setTimeout(() => ring.classList.remove('flash'), 100); }

    function generateCuTimeline(type, duration) {
        const events = [];
        if (type === '全音符') { events.push({t: 0, s: 'accent'}); } else if (type === '2分音符') { events.push({t: 0, s: 'accent'}, {t: duration / 2, s: 'sub'}); } else if (type === '4分音符') { for (let i = 0; i < totalBeatsInBar; i++) events.push({t: duration * i / totalBeatsInBar, s: i === 0 ? 'accent' : 'sub'}); } else if (type === '8分音符') { for (let i = 0; i < totalBeatsInBar * 2; i++) events.push({t: duration * i / (totalBeatsInBar * 2), s: i === 0 ? 'accent' : 'sub'}); } else if (type === '3連符') { for (let i = 0; i < totalBeatsInBar * 3; i++) events.push({t: duration * i / (totalBeatsInBar * 3), s: i === 0 ? 'accent' : 'sub'}); } else if (type === '16分音符') { for (let i = 0; i < totalBeatsInBar * 4; i++) events.push({t: duration * i / (totalBeatsInBar * 4), s: i === 0 ? 'accent' : 'sub'}); } else if (type === '6連符') { for (let i = 0; i < totalBeatsInBar * 6; i++) events.push({t: duration * i / (totalBeatsInBar * 6), s: i === 0 ? 'accent' : 'sub'}); } else if (type === '32分音符') { for (let i = 0; i < totalBeatsInBar * 8; i++) events.push({t: duration * i / (totalBeatsInBar * 8), s: i === 0 ? 'accent' : 'sub'}); } else if (type === '4拍3連') { events.push({t: 0, s: 'accent'}, {t: duration / 3, s: 'sub'}, {t: duration * 2 / 3, s: 'sub'}); } else if (type === '4拍5連') { for (let i = 0; i < 5; i++) events.push({t: duration * i / 5, s: i === 0 ? 'accent' : 'sub'}); } else if (type === '4拍7連') { for (let i = 0; i < 7; i++) events.push({t: duration * i / 7, s: i === 0 ? 'accent' : 'sub'}); } else if (type === '4拍9連') { for (let i = 0; i < 9; i++) events.push({t: duration * i / 9, s: i === 0 ? 'accent' : 'sub'}); } else if (type === '2拍3連') { for (let i = 0; i < 6; i++) events.push({t: duration * i / 6, s: i === 0 ? 'accent' : 'sub'}); } else if (type === '2拍5連') { for (let i = 0; i < 10; i++) events.push({t: duration * i / 10, s: i === 0 ? 'accent' : 'sub'}); } else if (type === '2拍7連符' || type === '2拍7連') { for (let i = 0; i < 14; i++) events.push({t: duration * i / 14, s: i === 0 ? 'accent' : 'sub'}); }
        return events;
    }

    function prepareNextCuBar() { 
        barDuration = (60.0 / bpm) * totalBeatsInBar; 
        cuBarStartTime = nextEventTime; 
        cuEventIdx = 0; 
        cuBarEvents = [];

        if (cuCountInBar === 1) {
            cuBarEvents.push({t: 0, type: 'countin', sound: 'voice_1', text: '1...'});
            if (totalBeatsInBar >= 3) {
                cuBarEvents.push({t: barDuration * 2 / totalBeatsInBar, type: 'countin', sound: 'voice_2', text: '2...'});
            }
            return;
        }
        if (cuCountInBar === 2) {
            for (let i = 0; i < totalBeatsInBar; i++) {
                let txt = Array.from({length: i+1}, (_, id) => id + 1).join('.');
                cuBarEvents.push({t: barDuration * i / totalBeatsInBar, type: 'countin', sound: 'voice_' + (i + 1), text: txt});
            }
            return;
        }

        if (currentCuIndex < 0) currentCuIndex = 0; 
        if (currentCuIndex >= cuActiveQueue.length) currentCuIndex = cuActiveQueue.length - 1; 
        const activeType = cuActiveQueue[currentCuIndex] || cuSequence[3]; 
        const clickEvents = generateCuTimeline(activeType, barDuration); 
        const constantQuarterEvents = []; 
        for (let i = 0; i < totalBeatsInBar; i++) { 
            constantQuarterEvents.push({t: barDuration * i / totalBeatsInBar, s: i === 0 ? 'base_accent' : 'base_strong'}); 
        } 
        clickEvents.forEach(ev => cuBarEvents.push({t: ev.t, type: 'click', sound: ev.s})); 
        constantQuarterEvents.forEach(ev => cuBarEvents.push({t: ev.t, type: 'base_quarter', sound: ev.s})); 
        cuBarEvents.sort((a, b) => a.t - b.t); 
    }

    function scheduleEvent() {
        const beatInterval = 60.0 / bpm;

        if (running && appMode === 'Speed' && spdCountInState === 0) {
            let curTime = audioCtx.currentTime;
            if (curTime - spdLastBpmUpdateTime >= spdStepSec) {
                let chunks = Math.floor((curTime - spdLastBpmUpdateTime) / spdStepSec);
                let sign = (spdDirection === 'rev') ? -1 : 1;
                if (spdDirection === 'bounce') { sign = spdBounceDirection; }
                else if (spdStartBpm > spdEndBpm) { sign = -sign; } 

                spdAutomatingBpm += sign * spdStepBpm * chunks;
                spdLastBpmUpdateTime += chunks * spdStepSec;

                let targetMax = Math.max(spdStartBpm, spdEndBpm);
                let targetMin = Math.min(spdStartBpm, spdEndBpm);

                if (spdDirection === 'bounce') {
                    if (spdAutomatingBpm >= targetMax) { spdAutomatingBpm = targetMax; spdBounceDirection = -1; }
                    else if (spdAutomatingBpm <= targetMin) { spdAutomatingBpm = targetMin; spdBounceDirection = 1; }
                } else {
                    if ((sign > 0 && spdAutomatingBpm >= targetMax) || (sign < 0 && spdAutomatingBpm <= targetMin)) {
                        spdAutomatingBpm = (sign > 0) ? targetMax : targetMin;
                        updateBPM(Math.round(spdAutomatingBpm));
                        setTimeout(stopMetronome, 10);
                        return;
                    }
                }
                updateBPM(Math.round(spdAutomatingBpm));
                if (nextEventTime < audioCtx.currentTime) {
                    nextEventTime = audioCtx.currentTime + 0.02;
                }
            }
        }

        if (appMode === 'Normal') {
            const beatLen = 60.0 / bpm;
            const isFirstBeat = (currentBeatInBar === 0);
            const isVoice = (soundType === 'Voice');
            const QUARTER_CLICK_LAYER = 0.7;
            const EIGHTH_CLICK_LAYER = 0.5;
            const SIXTEENTH_CLICK_LAYER = 0.4;
            const TRIPLET_CLICK_LAYER = 0.4;

            const copyBeat = currentBeatInBar;
            setTimeout(() => {
                flashLED(copyBeat);
            }, Math.max(0, (nextEventTime - audioCtx.currentTime) * 1000));

            if (isFirstBeat) {
                if (accentVol > 0.01) {
                    playTargetSound('Woodblock', nextEventTime, 0, accentVol * 1.2);
                }
            }

            if (quarterVol > 0.01) {
                if (isVoice) {
                    triggerVoiceBeatNumber(nextEventTime, currentBeatInBar, quarterVol);
                    const quarterClickKey = (currentBeatInBar === 0) ? 'wood_strong' : 'wood_weak';
                    triggerBufferAt(audioBuffers[quarterClickKey], nextEventTime, quarterVol * QUARTER_CLICK_LAYER);
                } else {
                    playTargetSound(soundType, nextEventTime, currentBeatInBar, quarterVol);
                }
            }

            if (eighthVol > 0.01) {
                const eighthTime = nextEventTime + getSwingSubbeatOffset(beatLen, 0.5);
                if (isVoice) {
                    triggerVoiceKey(eighthTime, 'voice_and', eighthVol);
                    triggerBufferAt(audioBuffers['wood_weak'], eighthTime, eighthVol * EIGHTH_CLICK_LAYER);
                } else {
                    triggerBufferAt(audioBuffers['wood_weak'], eighthTime, eighthVol);
                }
            }

            if (sixteenthVol > 0.01) {
                const sixteenthTime1 = nextEventTime + getSwingSubbeatOffset(beatLen, 0.25);
                const sixteenthTime2 = nextEventTime + getSwingSubbeatOffset(beatLen, 0.75);
                if (isVoice) {
                    triggerVoiceKey(sixteenthTime1, 'voice_e', sixteenthVol * 0.9);
                    triggerVoiceKey(sixteenthTime2, 'voice_da', sixteenthVol * 0.9);
                    triggerBufferAt(audioBuffers['wood_weak'], sixteenthTime1, sixteenthVol * SIXTEENTH_CLICK_LAYER);
                    triggerBufferAt(audioBuffers['wood_weak'], sixteenthTime2, sixteenthVol * SIXTEENTH_CLICK_LAYER);
                } else {
                    triggerBufferAt(audioBuffers['wood_weak'], sixteenthTime1, sixteenthVol * 0.8);
                    triggerBufferAt(audioBuffers['wood_weak'], sixteenthTime2, sixteenthVol * 0.8);
                }
            }

            if (tripletVol > 0.01) {
                const tripletTime1 = nextEventTime + (beatLen * (1.0 / 3.0));
                const tripletTime2 = nextEventTime + (beatLen * (2.0 / 3.0));
                if (isVoice) {
                    triggerVoiceKey(tripletTime1, 'voice_e', tripletVol * 0.9);
                    triggerVoiceKey(tripletTime2, 'voice_da', tripletVol * 0.9);
                    triggerBufferAt(audioBuffers['wood_weak'], tripletTime1, tripletVol * TRIPLET_CLICK_LAYER);
                    triggerBufferAt(audioBuffers['wood_weak'], tripletTime2, tripletVol * TRIPLET_CLICK_LAYER);
                } else {
                    triggerBufferAt(audioBuffers['wood_weak'], tripletTime1, tripletVol * 0.8);
                    triggerBufferAt(audioBuffers['wood_weak'], tripletTime2, tripletVol * 0.8);
                }
            }

            nextEventTime += beatLen;
            currentBeatInBar = (currentBeatInBar + 1) % totalBeatsInBar;
        } else if (appMode === 'ChangeUp') {
            if (cuEventIdx < cuBarEvents.length) {
                const ev = cuBarEvents[cuEventIdx]; const evAbsTime = cuBarStartTime + ev.t;
                
                if (ev.type === 'countin') {
                    const beatNumber = Math.round(ev.t / beatInterval);
                    setTimeout(() => {
                        flashLED(beatNumber);
                        if (cuCountInBar > 0) {
                            document.getElementById('cup-current-note').innerText = ev.text;
                            document.getElementById('cup-measure-progress').innerText = currentLang === 'JP' ? '⏱️ カウントイン' : 'Count In';
                        }
                    }, Math.max(0, (evAbsTime - audioCtx.currentTime) * 1000));

                    let buf = audioBuffers[ev.sound];
                    if (buf) triggerBufferAt(buf, evAbsTime, 1.5);
                    else triggerBufferAt(audioBuffers[beatNumber === 0 ? 'global_click_accent' : 'global_click_strong'], evAbsTime, 1.0);
                }
                else if (ev.type === 'base_quarter') { 
                    const beatNumber = Math.round(ev.t / beatInterval); 
                    setTimeout(() => {
                        flashLED(beatNumber);
                        updateCuUI(); 
                    }, Math.max(0, (evAbsTime - audioCtx.currentTime) * 1000)); 
                    
                    triggerVoiceBuffer(evAbsTime, beatNumber, cuVolGuide);
                    let clickKey = (beatNumber === 0) ? 'global_click_accent' : 'global_click_strong';
                    triggerBufferAt(audioBuffers[clickKey], evAbsTime, cuVolGuide * 0.7);
                }
                else if (ev.type === 'click') { 
                    triggerBufferAt(audioBuffers['wood_weak'], evAbsTime, cuVolPulse); 
                }
                nextEventTime = evAbsTime + 0.001; cuEventIdx++;
            } else { 
                nextEventTime = cuBarStartTime + barDuration; 
                currentStepInBeat = 0; 
                
                if (cuCountInBar === 1) {
                    cuCountInBar = 2;
                    prepareNextCuBar();
                } else if (cuCountInBar === 2) {
                    cuCountInBar = 0; 
                    const activeType = cuActiveQueue[currentCuIndex] || '4分音符';
                    const d = langDict[currentLang];
                    document.getElementById('cup-current-note').innerText = d.notes[activeType] || activeType;
                    document.getElementById('cup-measure-progress').innerText = `${currentBar} ${d.barProgress} / ${maxBarsPerPattern} ${d.barsUnit}`;

                    prepareNextCuBar();
                } else {
                    if (currentBar < maxBarsPerPattern) { 
                        currentBar++; 
                    } else { 
                        currentBar = 1; 
                        if (cuDirection === 'fwd') { currentCuIndex = (currentCuIndex + 1) % cuActiveQueue.length; } 
                        else if (cuDirection === 'rev') { currentCuIndex--; if (currentCuIndex < 0) { currentCuIndex = cuActiveQueue.length - 1; } } 
                        else if (cuDirection === 'bounce') { currentCuIndex += cuBounceDirection; if (currentCuIndex >= cuActiveQueue.length) { cuBounceDirection = -1; currentCuIndex = cuActiveQueue.length - 2; if (currentCuIndex < 0) currentCuIndex = 0; } else if (currentCuIndex < 0) { cuBounceDirection = 1; currentCuIndex = 1; if (currentCuIndex >= cuActiveQueue.length) currentCuIndex = cuActiveQueue.length - 1; } } 
                    } 
                    prepareNextCuBar(); 
                    setTimeout(updateCuUI, 0); 
                }
            }
        } else if (appMode === 'Speed') {
            if (spdCountInState === 1) {
                scheduleSpdRhythmStep(beatInterval, { withClickOnBeat: true, endAfterOneBar: true });
            } else {
                scheduleSpdRhythmStep(beatInterval);
            }
        } else if (appMode === 'OddTime') {
            let stepFactor = 4.0 / oddDenominator; 
            let stepInterval = beatInterval * stepFactor;

            let copyStep = oddCurrentStep;
            setTimeout(() => {
                flashOddDotVisual(copyStep);
                if (copyStep === 0) flashLED(0);
            }, Math.max(0, (nextEventTime - audioCtx.currentTime) * 1000));

            let isAccent = oddPatterns[oddCurrentStep];

            if (oddCurrentStep === 0 || isAccent) {
                oddVoiceCounter = 0;
            }
            
            if (soundType === 'Voice') {
                if (oddVoiceCounter < oddNumerator) {
                    let voiceBuf = audioBuffers['voice_' + (oddVoiceCounter + 1)];
                    if (voiceBuf) {
                        triggerBufferAt(voiceBuf, nextEventTime, oddVol * 1.5);
                    }
                }
                let clickKey = isAccent ? 'global_click_accent' : 'global_click_strong';
                triggerBufferAt(audioBuffers[clickKey], nextEventTime, isAccent ? oddVol * 1.2 : oddVol * 0.6);
            } else {
                if (oddCurrentStep === 0) {
                    triggerBufferAt(audioBuffers['wood_accent'], nextEventTime, oddVol * 1.3);
                } else if (isAccent) {
                    playTargetSound(soundType, nextEventTime, oddCurrentStep, oddVol * 1.2);
                } else {
                    triggerBufferAt(audioBuffers['wood_weak'], nextEventTime, oddVol * 0.8);
                }
            }

            nextEventTime += stepInterval;
            oddCurrentStep = (oddCurrentStep + 1) % oddNumerator;
            oddVoiceCounter++; 
        } else if (appMode === 'Modulation') {
            const activeModType = modMatrixPool[modMatrixIndex]; let stepsPerBeat = 4; let groupCount = 3; let match = activeModType.match(/(\d+)つ割り/); if (match) { groupCount = parseInt(match[1]); }
            if (activeModType.includes('16分')) { stepsPerBeat = 4; } else if (activeModType.includes('8分')) { stepsPerBeat = 2; } else if (activeModType.includes('3連')) { stepsPerBeat = 3; }
            let s = modStepIdx % stepsPerBeat; let isBeatHead = (s === 0); let isBarHead = (modStepIdx % (stepsPerBeat * totalBeatsInBar) === 0);
            const beatLen = beatInterval;
            if (isBeatHead) modBeatStartTime = nextEventTime;
            const eventTime = modBeatStartTime + getSwingSubbeatOffset(beatLen, s / stepsPerBeat);
            
            let stepsPerBar = stepsPerBeat * totalBeatsInBar;
            let currentBarCount = Math.floor(modStepIdx / stepsPerBar);
            
            let isMutedPeriod = false;
            if (modTrainingEnabled) {
                let cycleBlock = Math.floor(currentBarCount / modTrainingCycleBars);
                if (cycleBlock % 2 === 1) {
                    isMutedPeriod = true; 
                }
            }

            if (isBeatHead) { 
                const beatInBar = Math.floor((modStepIdx % (stepsPerBeat * totalBeatsInBar)) / stepsPerBeat);
                
                if (!isMutedPeriod) {
                    let voiceNum = (beatInBar % 8) + 1;
                    let voiceBuf = audioBuffers['voice_' + voiceNum];
                    if (voiceBuf) {
                        triggerBufferAt(voiceBuf, eventTime, modVolGuide * 1.5);
                    }
                    
                    let clickKey = isBarHead ? 'global_click_accent' : 'global_click_strong';
                    triggerBufferAt(audioBuffers[clickKey], eventTime, modVolGuide * 0.8);
                }
                
                setTimeout(() => flashLED(beatInBar), Math.max(0, (eventTime - audioCtx.currentTime) * 1000)); 
            }
            
            let isAccent = (modStepIdx % groupCount === 0); let woodKey = isAccent ? 'wood_accent' : 'wood_strong'; let currentVol = isAccent ? modVolAccent : modVolNormal; let currentBuffer = isAccent ? audioBuffers[woodKey] : audioBuffers['wood_mod_normal']; 
            
            triggerBufferAt(currentBuffer, eventTime, currentVol);
            
            const nextS = (s + 1) % stepsPerBeat;
            if (nextS === 0) {
                nextEventTime = modBeatStartTime + beatLen;
            } else {
                nextEventTime = modBeatStartTime + getSwingSubbeatOffset(beatLen, nextS / stepsPerBeat);
            }
            modStepIdx++;
            
            if (modStepIdx >= 999999) { 
                let alignUnit = stepsPerBar * groupCount;
                modStepIdx = modStepIdx % alignUnit;
            }
        }
    }

        document.getElementById('poly-modal').style.display = 'flex';
    }

    function saveCurrentConfig() { stopMetronome(); const name = prompt(langDict[currentLang].modalPrompt, `Pattern ${setlist.length + 1}`); if (!name) return; let data = { name: name, bpm: bpm, mode: appMode, timeSignature: totalBeatsInBar }; if (appMode === 'Normal') { data.swingMode = swingMode; data.swingRatio = swingRatio; data.mixerAccent = getMixerFaderValue('accent'); data.mixerQuarter = getMixerFaderValue('quarter'); data.mixerEighth = getMixerFaderValue('eighth'); data.mixerSixteenth = getMixerFaderValue('sixteenth'); data.mixerTriplet = getMixerFaderValue('triplet'); } else if (appMode === 'ChangeUp') { data.cuSelectedFlags = [...cuSelectedFlags]; data.cuActiveQueue = [...cuActiveQueue]; data.maxBarsPerPattern = maxBarsPerPattern; data.cuVolGuide = cuVolGuide; data.cuVolPulse = cuVolPulse; data.cuDirection = cuDirection; } else if (appMode === 'Speed') { data.spdStartBpm = spdStartBpm; data.spdEndBpm = spdEndBpm; data.spdStepSec = spdStepSec; data.spdStepBpm = spdStepBpm; data.spdDirection = spdDirection; data.spdRhythmIndex = spdRhythmIndex; data.spdVolGuide = spdVolGuide; data.spdVolPulse = spdVolPulse; } else if (appMode === 'OddTime') { data.oddSignatureKey = oddSignatureKey; data.oddPatterns = [...oddPatterns]; data.oddVol = oddVol; } else if (appMode === 'Modulation') { data.modMatrixIndex = modMatrixIndex; data.modVolGuide = modVolGuide; data.modVolAccent = modVolAccent; data.modVolNormal = modVolNormal; data.swingMode = swingMode; data.swingRatio = swingRatio; data.modTrainingEnabled = modTrainingEnabled; data.modTrainingCycleBars = modTrainingCycleBars; } setlist.push(data); localStorage.setItem(DATA_FILE, JSON.stringify(setlist)); }

    initTimeSignatureData(4); buildCuSelectors();
    initCustomFaders();
    initTempoDial();
    initMixerState();
    requestAnimationFrame(() => {
        refreshAllCustomFaders();
        syncAllMixerVolsFromFaders();
    });

    function mapDeviceLocaleToAppLang(locale) {
        const l = String(locale || '').toLowerCase();
        if (l.startsWith('ja')) return 'JP';
        if (l.startsWith('zh')) return 'ZH';
        if (l.startsWith('ko')) return 'KO';
        if (l.startsWith('es')) return 'ES';
        if (l.startsWith('pt')) return 'PT';
        return 'EN';
    }

    function getDeviceLocale() {
        if (Array.isArray(navigator.languages) && navigator.languages.length > 0) {
            return navigator.languages[0];
        }
        return navigator.language || navigator.userLanguage || 'en';
    }

    function detectAndSetLanguage() {
        const selectedLang = mapDeviceLocaleToAppLang(getDeviceLocale());
        changeLang(selectedLang);
    }
    detectAndSetLanguage();

    applyOddPreset('7/8');

    function fitToScreen() {
        if (window.innerWidth > 520) { document.documentElement.style.removeProperty('--app-h'); document.querySelector('.container')?.style.removeProperty('height'); return; }
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight; const h = Math.round(vh) + 'px';
        document.documentElement.style.setProperty('--app-h', h); const container = document.querySelector('.container'); if (container) container.style.height = h;
    }
    fitToScreen(); window.addEventListener('resize', () => { fitToScreen(); refreshAllCustomFaders(); }); window.addEventListener('orientationchange', () => setTimeout(() => { fitToScreen(); refreshAllCustomFaders(); }, 120));
    if (window.visualViewport) { window.visualViewport.addEventListener('resize', () => { fitToScreen(); refreshAllCustomFaders(); }); window.visualViewport.addEventListener('scroll', fitToScreen); }

    function buildCuSelectors() {
        const r1 = document.getElementById('cu-row-1'); const r2 = document.getElementById('cu-row-2'); if(!r1 || !r2) return;
        r1.innerHTML = ''; r2.innerHTML = ''; const d = langDict[currentLang].notes;
        cuSequence.forEach((note, idx) => {
            const btn = document.createElement('div'); btn.className = 'cu-btn'; if(cuSelectedFlags[idx]) btn.classList.add('selected');
            btn.innerText = d[note] || note;
            btn.onclick = () => { cuSelectedFlags[idx] = !cuSelectedFlags[idx]; btn.classList.toggle('selected', cuSelectedFlags[idx]); cuActiveQueue = []; cuSequence.forEach((n, i) => { if(cuSelectedFlags[i]) cuActiveQueue.push(n); }); currentCuIndex = 0; currentBar = 1; if(running && appMode==='ChangeUp') prepareNextCuBar(); updateCuUI(); };
            if(idx < 8) r1.appendChild(btn); else r2.appendChild(btn);
        });
    }

    let recoveringFromBackground = false;

    // Keep the SAME web metronome running in background (normal app behavior).
    function onAppBackground() {
        if (!running || !audioCtx) return;
        try {
            if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
                audioCtx.resume();
            }
        } catch (e) {}
        startSilentKeepAlive();
        scheduleAheadTime = scheduleAheadTimeBackground;
        let safety = 0;
        while (nextEventTime < audioCtx.currentTime + scheduleAheadTime && safety++ < 256) {
            scheduleEvent();
        }
        try { notifyNative('metronomeStart', { bpm: getEffectiveBpm() }); } catch (e) {}
    }

    async function onAppForeground() {
        if (!running) return;
        if (recoveringFromBackground) return;
        recoveringFromBackground = true;
        try {
            try { notifyNative('audioResume'); } catch (e) {}
            if (audioCtx && (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted')) {
                await audioCtx.resume();
            }
            scheduleAheadTime = scheduleAheadTimeForeground;
            startSilentKeepAlive();
            if (!timerID) {
                timerID = setInterval(scheduler, lookahead);
            }
            if (!Number.isFinite(nextEventTime) || nextEventTime < audioCtx.currentTime - 0.5) {
                nextEventTime = audioCtx.currentTime + 0.02;
            }
            scheduler();
        } catch (err) {
            console.error('Foreground recover failed:', err);
        } finally {
            recoveringFromBackground = false;
        }
    }

    function handleVisibilityChange() {
        if (document.hidden) onAppBackground();
        else onAppForeground();
    }

    function handleForegroundUserGesture() {
        if (!running || !audioCtx) return;
        if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
            onAppForeground();
        }
    }

    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('pageshow', detectAndSetLanguage);
    window.addEventListener('focus', detectAndSetLanguage);
    if (typeof window.onlanguagechange !== 'undefined') {
        window.addEventListener('languagechange', detectAndSetLanguage);
    }
    window.addEventListener('pointerdown', handleForegroundUserGesture, { passive: true });
    window.addEventListener('touchend', handleForegroundUserGesture, { passive: true });
</script>
