<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>音符SVGテスト</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            min-height: 100%;
            background: #121212;
            color: #f5f5f7;
            font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 20px 40px;
            gap: 24px;
            min-height: 100dvh;
        }
        h1 { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.75); }

        .lcd-panel {
            background: linear-gradient(180deg, #9aa89a 0%, #8a9688 100%);
            border-radius: 10px;
            padding: 22px 14px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -2px 6px rgba(0,0,0,0.15), 0 8px 28px rgba(0,0,0,0.45);
            max-width: 420px;
            width: 100%;
        }
        .lcd-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 6px;
            min-height: 76px;
        }
        .pattern {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 76px;
        }
        .combo {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        :root {
            --note-size: 32px;
            --rest-size: 22px;
        }

        .combo.eighth { gap: 0; }
        .combo.sixteenth { gap: 0; }
        .combo.sixteenth .note-icon { margin-left: -6px; }
        .combo.sixteenth .note-icon:first-child { margin-left: 0; }
        .combo .note-icon.eighth-rest,
        .combo .note-icon.sixteenth-rest { margin-left: 0; }

        .note-icon {
            display: block;
            flex-shrink: 0;
            overflow: visible;
            width: var(--note-size);
            height: var(--note-size);
        }
        .note-icon.eighth-rest,
        .note-icon.sixteenth-rest {
            width: var(--rest-size);
            height: var(--rest-size);
        }
        .note-icon path, .note-icon rect { fill: #231f20; }
        .note-icon.triplet {
            width: calc(var(--note-size) * 3.4);
            height: calc(var(--note-size) * 1.15);
        }

        .caption {
            font-size: 11px;
            color: rgba(235,235,245,0.45);
            text-align: center;
            max-width: 420px;
            line-height: 1.7;
        }
        .scale-test {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            justify-content: center;
        }
        .scale-box {
            background: #1e1e22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .scale-box .label { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 8px; }
        .scale-box.s15 { --note-size: 48px; --rest-size: 33px; }
        .scale-box.s2  { --note-size: 64px; --rest-size: 44px; }
    </style>
</head>
